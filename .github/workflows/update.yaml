name: Update Shadowrocket geosite rulesets

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate rulesets
        run: python scripts/geosite_to_shadowrocket.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add rules/

          if git diff --cached --quiet; then
            echo "No changes in rules"
          else
            git commit -m "chore: update rules"
            git push
          fi
